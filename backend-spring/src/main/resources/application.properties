spring.application.name=msme-signal-score

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/msme_db
spring.datasource.username=postgres
spring.datasource.password=Postgres@9124
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Server
server.port=8080

# JWT
app.jwt.secret=msme_signal_score_secret_key_production_minimum_32chars
app.jwt.expiration-ms=86400000

# Actuator
management.endpoints.web.exposure.include=health

# Jackson - use snake_case for all JSON
spring.jackson.property-naming-strategy=SNAKE_CASE
